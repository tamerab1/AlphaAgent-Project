[tool:pytest]
testpaths = tests
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning:httpx
    ignore::DeprecationWarning:jose

[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,.venv,migrations

[mypy]
python_version = 3.11
ignore_missing_imports = true
strict = false
