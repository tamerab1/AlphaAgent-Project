name: Backend CI Pipeline

on:
  push:
    branches: [ "Dev", "main" ]
  pull_request:
    branches: [ "Dev", "main" ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements-dev.txt

    - name: Install Dev Dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Format Check (black)
      run: cd backend && black --check .

    - name: Lint (flake8)
      run: cd backend && flake8 .

    - name: Security Scan (bandit)
      run: cd backend && bandit -r . -x ./tests -ll

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements-dev.txt

    - name: Install Dev Dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run Tests with Coverage
      env:
        PYTHONPATH: ${{ github.workspace }}/backend
      run: |
        cd backend
        pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t alphaagent-backend:${{ github.sha }} ./backend

    - name: Verify Image Starts
      run: |
        docker run -d --name test-container -p 8000:8000 alphaagent-backend:${{ github.sha }}
        sleep 5
        curl --fail http://localhost:8000/health || (docker logs test-container && exit 1)
        docker stop test-container
